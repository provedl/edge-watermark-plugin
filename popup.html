<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 380px;
      padding: 16px;
      font-family: "Microsoft YaHei", sans-serif;
      font-size: 14px;
      color: #333;
    }
    h2 {
      font-size: 16px;
      margin-bottom: 12px;
    }
    .section {
      margin-bottom: 14px;
    }
    label {
      display: block;
      font-weight: bold;
      margin-bottom: 6px;
    }
    input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: #4a90d9;
    }
    .rule-list {
      max-height: 200px;
      overflow-y: auto;
      border: 1px solid #eee;
      border-radius: 4px;
      margin-bottom: 10px;
    }
    .rule-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      border-bottom: 1px solid #f0f0f0;
    }
    .rule-item:last-child { border-bottom: none; }
    .rule-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
      overflow: hidden;
    }
    .rule-site {
      font-size: 13px;
      font-weight: bold;
      color: #4a90d9;
    }
    .rule-text {
      font-size: 12px;
      color: #666;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 280px;
    }
    .btn-remove {
      background: none;
      border: none;
      color: #e74c3c;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      flex-shrink: 0;
      margin-left: 8px;
    }
    .add-form {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .add-row {
      display: flex;
      gap: 6px;
    }
    .add-row input { flex: 1; }
    .btn {
      padding: 6px 12px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    .btn-primary {
      background: #4a90d9;
      color: #fff;
    }
    .btn-primary:hover { background: #357abd; }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .switch {
      position: relative;
      width: 40px;
      height: 22px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      background: #ccc;
      border-radius: 22px;
      transition: 0.3s;
      cursor: pointer;
    }
    .slider::before {
      content: "";
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: 0.3s;
    }
    .switch input:checked + .slider { background: #4a90d9; }
    .switch input:checked + .slider::before { transform: translateX(18px); }
    .empty-tip {
      text-align: center;
      color: #999;
      padding: 12px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <h2>网页水印助手</h2>

  <div class="toggle-row">
    <span>启用水印</span>
    <label class="switch">
      <input type="checkbox" id="enableToggle" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="section">
    <label>水印规则</label>
    <div class="rule-list" id="ruleList">
      <div class="empty-tip">暂无规则，请添加</div>
    </div>
    <div class="add-form">
      <input type="text" id="newSite" placeholder="网站域名，例如: example.com">
      <div class="add-row">
        <input type="text" id="newText" placeholder="水印文字">
        <button class="btn btn-primary" id="addRuleBtn">添加</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
